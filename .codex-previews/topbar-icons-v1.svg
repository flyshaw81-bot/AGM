      .icon { fill: none; stroke: #e8ebf2; stroke-width: 2.15; stroke-linecap: round; stroke-linejoin: round; }
      .iconMuted { stroke: #aab1bd; }
      .dot { fill: #e8ebf2; stroke: none; }
      .accent { stroke: #9f7cff; }
      .mint { stroke: #34d9b5; }
      .smallText { fill: #e8ebf2; font: 760 20px Inter, Arial, sans-serif; }
    </style>
