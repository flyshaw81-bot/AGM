<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGM 项目里程碑看板</title>
    <style>
      :root { color-scheme: dark; --bg: #0b1020; --panel: rgba(18, 26, 44, 0.92); --panel-soft: rgba(25, 36, 58, 0.78); --border: rgba(134, 160, 204, 0.18); --text: #e8eef9; --muted: #9db0cd; --accent: #6ea8ff; --accent-soft: rgba(110, 168, 255, 0.18); --ok: #4fd1a5; --planned: #7f8aa3; --blocked: #ff7a7a; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; background: radial-gradient(circle at top, rgba(48, 72, 120, 0.28), transparent 36%), linear-gradient(180deg, #0b1020 0%, #0a0f1a 100%); color: var(--text); }
      .shell { width: min(1280px, calc(100vw - 32px)); margin: 24px auto; display: grid; gap: 16px; }
      .hero, .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 20px 48px rgba(0, 0, 0, 0.28); backdrop-filter: blur(12px); }
      .hero { padding: 24px; display: grid; gap: 18px; }
      .hero__eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
      .hero__title { margin: 0; font-size: clamp(30px, 4vw, 46px); line-height: 1.1; }
      .hero__meta { display: flex; flex-wrap: wrap; gap: 10px; }
      .badge { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border); background: var(--panel-soft); border-radius: 999px; padding: 8px 12px; color: var(--muted); font-size: 13px; }
      .overview { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
      .grid { display: grid; grid-template-columns: 1.35fr 0.95fr; gap: 16px; }
      .stack { display: grid; gap: 16px; }
      .panel { padding: 18px; }
      .panel__title { margin: 0 0 14px; font-size: 16px; }
      .metric__label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
      .metric__value { margin-top: 8px; font-size: 28px; font-weight: 700; }
      .metric__hint { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.5; }
      .progress { height: 8px; border-radius: 999px; background: rgba(255, 255, 255, 0.08); overflow: hidden; margin: 10px 0 8px; }
      .progress__bar { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #5e96ff 0%, #8dc0ff 100%); }
      .status { padding: 4px 10px; border-radius: 999px; font-size: 12px; border: 1px solid transparent; }
      .status--completed { color: var(--ok); background: rgba(79, 209, 165, 0.12); border-color: rgba(79, 209, 165, 0.2); }
      .status--in_progress { color: var(--accent); background: var(--accent-soft); border-color: rgba(110, 168, 255, 0.24); }
      .status--planned { color: var(--planned); background: rgba(127, 138, 163, 0.14); border-color: rgba(127, 138, 163, 0.18); }
      .status--blocked { color: var(--blocked); background: rgba(255, 122, 122, 0.12); border-color: rgba(255, 122, 122, 0.2); }
      .milestone-list, .bullet-list { display: grid; gap: 12px; }
      .milestone, .bullet { border: 1px solid var(--border); border-radius: 16px; background: rgba(255, 255, 255, 0.03); padding: 14px; }
      .milestone__head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
      .milestone__title { font-size: 15px; font-weight: 600; }
      .kv { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
      .kv:last-child { border-bottom: 0; padding-bottom: 0; }
      .muted { color: var(--muted); }
      .small { font-size: 13px; line-height: 1.5; }
      @media (max-width: 1100px) { .overview, .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div><div class="hero__eyebrow">AGM 终局里程碑看板</div><h1 id="projectName" class="hero__title">加载中…</h1><p id="projectSummary" class="muted small"></p></div>
        <div class="hero__meta"><div class="badge">状态：<strong id="projectStatus"></strong></div><div class="badge">更新于：<strong id="updatedAt"></strong></div></div>
      </section>
      <section class="overview">
        <div class="panel"><div class="metric__label">总体进度</div><div id="overallProgress" class="metric__value">0%</div><div class="progress"><div id="overallProgressBar" class="progress__bar" style="width: 0%"></div></div><div class="metric__hint">这里衡量的是距离最终 AGM 目标的完成度，而不是当前局部 bridge 阶段。</div></div>
        <div class="panel"><div class="metric__label">剩余进度</div><div id="remainingProgress" class="metric__value">0%</div><div class="metric__hint">离“完整独立、可扩展、能力与体验顶级”的终局还剩多少路要走。</div></div>
        <div class="panel"><div class="metric__label">当前里程碑</div><div id="currentMilestoneTitle" class="metric__value" style="font-size: 22px">—</div><div id="currentMilestoneSummary" class="metric__hint"></div></div>
        <div class="panel"><div class="metric__label">下一里程碑</div><div id="nextMilestoneTitle" class="metric__value" style="font-size: 22px">—</div><div id="nextMilestoneSummary" class="metric__hint"></div></div>
      </section>
      <section class="grid">
        <div class="stack"><section class="panel"><h2 class="panel__title">关键里程碑</h2><div id="milestones" class="milestone-list"></div></section></div>
        <div class="stack"><section class="panel"><h2 class="panel__title">距离最终目标还差什么</h2><div id="remainingToGoal" class="bullet-list"></div></section><section class="panel"><h2 class="panel__title">终局判断标准</h2><div class="kv"><span class="muted">独立性</span><strong>不再依赖 legacy UI</strong></div><div class="kv"><span class="muted">编辑能力</span><strong>强编辑闭环</strong></div><div class="kv"><span class="muted">算法能力</span><strong>持续增强并可扩展</strong></div><div class="kv"><span class="muted">产品体验</span><strong>精美、易用、人性化</strong></div></section></div>
      </section>
    </main>

      function setText(id, value) { document.getElementById(id).textContent = value ?? "—"; }
      function renderStatus(status) { const labels = {planned: "计划中", in_progress: "进行中", completed: "已完成", blocked: "阻塞"}; return `<span class="status status--${status}">${labels[status] || status}</span>`; }
      function renderStatusText(status) { const labels = {planned: "计划中", in_progress: "进行中", completed: "已完成", blocked: "阻塞"}; return labels[status] || status; }
      function renderBullets(containerId, items, emptyText = "暂无内容") { const container = document.getElementById(containerId); container.innerHTML = items.length ? items.map(item => `<div class="bullet">${item}</div>`).join("") : `<div class="bullet muted">${emptyText}</div>`; }
      function renderMilestones(items) { const container = document.getElementById("milestones"); container.innerHTML = items.length ? items.map(item => `<article class="milestone"><div class="milestone__head"><div class="milestone__title">${item.title}</div>${renderStatus(item.status)}</div><div class="progress"><div class="progress__bar" style="width: ${item.progress}%"></div></div><div class="muted small" style="margin-bottom: 6px">完成度 ${item.progress}%</div><div class="small">${item.summary}</div></article>`).join("") : `<div class="milestone muted">暂无关键里程碑</div>`; }
      function renderDashboard(data) { setText("projectName", data.project.name); setText("projectSummary", data.project.summary); setText("projectStatus", renderStatusText(data.project.status)); setText("updatedAt", data.updatedAt); setText("overallProgress", `${data.project.overallProgress}%`); document.getElementById("overallProgressBar").style.width = `${data.project.overallProgress}%`; setText("remainingProgress", `${data.project.remainingProgress}%`); setText("currentMilestoneTitle", data.currentMilestone.title); setText("currentMilestoneSummary", data.currentMilestone.summary); setText("nextMilestoneTitle", data.nextMilestone.title); setText("nextMilestoneSummary", data.nextMilestone.summary); renderMilestones(data.milestones || []); renderBullets("remainingToGoal", data.remainingToGoal || [], "暂无剩余缺口"); }
      async function loadData() { const isFileProtocol = window.location.protocol === "file:"; if (isFileProtocol) { renderDashboard(fallbackData); return; } try { const response = await fetch("./project-progress.json", {cache: "no-store"}); if (!response.ok) throw new Error(`HTTP ${response.status}`); renderDashboard(await response.json()); } catch { renderDashboard(fallbackData); } }

  </body>
</html>
